<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoTrack Pro — Two-Wheeler Dealer Suite</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f8fa;--surface:#ffffff;--surface2:#f0f2f5;--border:#e2e6ea;--border2:#c8cdd4;
  --text:#1a1d23;--text2:#5a6070;--text3:#9aa0ad;
  --blue:#2563eb;--blue-light:#eff4ff;--blue-dark:#1d4ed8;
  --green:#16a34a;--green-light:#f0fdf4;
  --amber:#d97706;--amber-light:#fffbeb;
  --red:#dc2626;--red-light:#fef2f2;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --sidebar:230px;--topbar:52px;
  --radius:8px;--radius-lg:12px;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
}
body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}

/* ─── LOGIN ─────────────────────────────────────────────────── */
#login-screen{
  position:fixed;inset:0;background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 50%,#2563eb 100%);
  display:flex;align-items:center;justify-content:center;z-index:999;
}
.login-box{
  background:#fff;border-radius:16px;padding:40px 44px;width:420px;
  box-shadow:0 24px 60px rgba(0,0,0,0.18);
}
.login-logo{font-size:22px;font-weight:700;color:#1d4ed8;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.login-box h2{font-size:18px;font-weight:600;margin-bottom:20px;color:var(--text);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.field input,.field select{
  width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);
  font-size:13px;color:var(--text);background:#fff;font-family:inherit;
  transition:border 0.15s;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue);}
.login-btn{
  width:100%;padding:11px;background:var(--blue);color:#fff;border:none;
  border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;
  transition:background 0.15s;margin-top:6px;
}
.login-btn:hover{background:var(--blue-dark);}
.login-roles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.role-chip{
  padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius);
  font-size:12px;cursor:pointer;text-align:center;transition:all 0.15s;color:var(--text2);
}
.role-chip:hover{border-color:var(--blue);color:var(--blue);}
.role-chip.sel{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:500;}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;}

/* ─── APP SHELL ──────────────────────────────────────────────── */
#app{display:none;height:100vh;flex-direction:column;}
#app.show{display:flex;}
.app-body{display:flex;flex:1;overflow:hidden;}

/* TOPBAR */
.topbar{
  height:var(--topbar);background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;
  position:sticky;top:0;z-index:10;
}
.topbar-brand{font-size:15px;font-weight:700;color:var(--blue);margin-right:8px;}
.topbar-slash{color:var(--border2);}
.topbar-page{font-size:14px;font-weight:500;color:var(--text);}
.topbar-spacer{flex:1;}
.topbar-search{
  padding:6px 12px;border:1px solid var(--border);border-radius:20px;
  font-size:13px;width:220px;background:var(--bg);color:var(--text);
}
.topbar-btn{
  padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);
  background:#fff;font-size:12px;cursor:pointer;color:var(--text2);
  display:flex;align-items:center;gap:6px;
}
.topbar-btn:hover{background:var(--bg);}
.notif-dot-top{
  width:8px;height:8px;background:var(--red);border-radius:50%;
  position:absolute;top:-2px;right:-2px;
}
.user-pill{
  display:flex;align-items:center;gap:8px;padding:5px 10px;
  background:var(--bg);border-radius:20px;cursor:pointer;
}
.avatar{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-info{font-size:12px;line-height:1.3;}
.user-info .uname{font-weight:500;}
.user-info .urole{color:var(--text3);}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar);min-width:var(--sidebar);background:#fff;
  border-right:1px solid var(--border);overflow-y:auto;
  display:flex;flex-direction:column;
}
.nav-section{
  padding:16px 14px 4px;font-size:10px;font-weight:600;
  color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 14px;
  cursor:pointer;font-size:13px;color:var(--text2);
  border-left:3px solid transparent;transition:all 0.1s;margin:1px 0;
}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{
  background:var(--blue-light);color:var(--blue);
  border-left-color:var(--blue);font-weight:500;
}
.nav-icon{width:18px;text-align:center;font-size:15px;flex-shrink:0;}
.nav-badge{
  margin-left:auto;background:var(--red);color:#fff;
  font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;
}
.sidebar-footer{
  margin-top:auto;padding:14px;border-top:1px solid var(--border);
  font-size:12px;color:var(--text3);
}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px;}

/* ─── COMMON COMPONENTS ──────────────────────────────────────── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.page-title{font-size:18px;font-weight:600;}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:14px 16px;
}
.stat-card .s-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.stat-card .s-val{font-size:22px;font-weight:700;color:var(--text);}
.stat-card .s-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.stat-card.blue .s-val{color:var(--blue);}
.stat-card.green .s-val{color:var(--green);}
.stat-card.amber .s-val{color:var(--amber);}
.stat-card.red .s-val{color:var(--red);}
.stat-card.purple .s-val{color:var(--purple);}

.card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:16px;
}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:600;}
.card-sub{font-size:12px;color:var(--text2);margin-top:1px;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr;}}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  text-align:left;padding:8px 10px;font-size:11px;font-weight:600;
  color:var(--text2);border-bottom:1px solid var(--border);
  background:var(--bg);position:sticky;top:0;
}
tbody td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#fafbfc;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500;}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-amber{background:var(--amber-light);color:var(--amber);}
.badge-red{background:var(--red-light);color:var(--red);}
.badge-blue{background:var(--blue-light);color:var(--blue);}
.badge-gray{background:var(--surface2);color:var(--text2);}
.badge-purple{background:var(--purple-light);color:var(--purple);}

/* BUTTONS */
.btn{
  padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;
  cursor:pointer;border:none;font-family:inherit;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-dark);}
.btn-secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--bg);}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #fecaca;}
.btn-danger:hover{background:#fee2e2;}
.btn-green{background:var(--green-light);color:var(--green);border:1px solid #bbf7d0;}
.btn-sm{padding:5px 10px;font-size:12px;}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:12px;font-weight:500;color:var(--text2);}
.fg input,.fg select,.fg textarea{
  padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);
  font-size:13px;color:var(--text);background:#fff;font-family:inherit;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);}
.fg textarea{resize:vertical;min-height:70px;}
.fg-full{grid-column:1/-1;}

/* ALERTS */
.alert{
  padding:10px 14px;border-radius:var(--radius);font-size:13px;
  display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;
}
.alert-icon{font-size:15px;margin-top:1px;flex-shrink:0;}
.alert-blue{background:var(--blue-light);color:#1d4ed8;border:1px solid #bfdbfe;}
.alert-amber{background:var(--amber-light);color:#92400e;border:1px solid #fde68a;}
.alert-red{background:var(--red-light);color:#991b1b;border:1px solid #fecaca;}
.alert-green{background:var(--green-light);color:#14532d;border:1px solid #bbf7d0;}

/* PROGRESS BAR */
.prog-row{margin-bottom:10px;}
.prog-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.prog-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.3s;}

/* UPLOAD ZONE */
.upload-zone{
  border:2px dashed var(--border2);border-radius:var(--radius-lg);
  padding:28px;text-align:center;cursor:pointer;transition:all 0.15s;
  background:var(--bg);
}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-light);}
.upload-icon{font-size:32px;margin-bottom:8px;}

/* MODAL */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:#fff;border-radius:var(--radius-lg);width:100%;max-width:580px;
  max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.modal-head{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;
}
.modal-title{font-size:15px;font-weight:600;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);line-height:1;}
.modal-body{padding:22px;}
.modal-footer{
  padding:14px 22px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;
}

/* TABS */
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.tab{
  padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text2);
  border-bottom:2px solid transparent;transition:all 0.15s;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500;}

/* TIMELINE */
.timeline{padding-left:22px;position:relative;}
.timeline::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:1px;background:var(--border);}
.tl-item{position:relative;margin-bottom:16px;}
.tl-dot{
  position:absolute;left:-18px;top:4px;width:10px;height:10px;
  border-radius:50%;background:var(--blue);border:2px solid #fff;box-shadow:0 0 0 1px var(--border);
}
.tl-dot.green{background:var(--green);}
.tl-dot.amber{background:var(--amber);}
.tl-dot.red{background:var(--red);}
.tl-title{font-size:13px;font-weight:500;}
.tl-sub{font-size:12px;color:var(--text2);margin-top:2px;}

/* CHART BARS */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px;padding-top:8px;}
.bar-col-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-rect{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height 0.3s;}
.bar-lbl{font-size:10px;color:var(--text3);}

/* DOC ITEM */
.doc-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:#fff;margin-bottom:8px;
}
.doc-thumb{width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.doc-info{flex:1;}
.doc-name{font-size:13px;font-weight:500;}
.doc-meta{font-size:11px;color:var(--text3);}
.doc-actions{display:flex;gap:6px;}

/* NOTIFICATION ITEM */
.notif-item{
  display:flex;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border);align-items:flex-start;
}
.notif-item:last-child{border-bottom:none;}
.notif-bullet{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.notif-content{flex:1;}
.notif-title{font-size:13px;font-weight:500;}
.notif-body{font-size:12px;color:var(--text2);margin-top:2px;}
.notif-meta{font-size:11px;color:var(--text3);margin-top:4px;display:flex;gap:10px;align-items:center;}

/* REPORT CARDS */
.rpt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
.rpt-card{
  padding:16px;border:1px solid var(--border);border-radius:var(--radius-lg);
  cursor:pointer;text-align:center;background:#fff;transition:all 0.15s;
}
.rpt-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(37,99,235,0.12);}
.rpt-icon{font-size:26px;margin-bottom:8px;}
.rpt-title{font-size:13px;font-weight:600;}
.rpt-desc{font-size:11px;color:var(--text2);margin-top:3px;}

/* STOCK BAR */
.stk-bar-wrap{display:flex;align-items:center;gap:10px;}
.stk-bar{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.stk-fill{height:100%;border-radius:3px;}

/* PRINT / PDF styles */
@media print{
  .sidebar,.topbar,.no-print{display:none!important;}
  .main{padding:0;}
  .card{break-inside:avoid;}
}

/* UTILITY */
.mono{font-family:'Courier New',monospace;font-size:12px;}
.text-blue{color:var(--blue);}
.text-green{color:var(--green);}
.text-amber{color:var(--amber);}
.text-red{color:var(--red);}
.text-muted{color:var(--text2);}
.fw-bold{font-weight:700;}
.mb0{margin-bottom:0;}
.mt8{margin-top:8px;}
.mt16{margin-top:16px;}
.gap8{gap:8px;}
.flex{display:flex;}
.flex-ac{display:flex;align-items:center;}
.space-between{justify-content:space-between;}
.d-none{display:none!important;}
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🏍 AutoTrack Pro</div>
    <div class="login-sub">Two-Wheeler Dealer Management Suite</div>
    <h2>Sign in to your account</h2>
    <div class="field">
      <label>Select your role</label>
      <div class="login-roles">
        <div class="role-chip sel" data-role="dealer" onclick="selectRole(this)">🏢 Dealer</div>
        <div class="role-chip" data-role="accountant" onclick="selectRole(this)">🧾 Accountant</div>
        <div class="role-chip" data-role="subdealer" onclick="selectRole(this)">🛵 Sub-Dealer</div>
        <div class="role-chip" data-role="manager" onclick="selectRole(this)">📊 Manager</div>
      </div>
    </div>
    <div class="field"><label>Username</label><input id="login-user" value="dealer@rajesh.com" placeholder="Enter username"/></div>
    <div class="field"><label>Password</label><input id="login-pass" type="password" value="••••••••" placeholder="Enter password"/></div>
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-hint">Demo: any credentials work · Role determines access</div>
  </div>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <span class="topbar-brand">🏍 AutoTrack Pro</span>
    <span class="topbar-slash">›</span>
    <span class="topbar-page" id="topbar-page">Dashboard</span>
    <div class="topbar-spacer"></div>
    <input class="topbar-search" id="global-search" placeholder="🔍  Search vehicles, sub-dealers..." oninput="globalSearch(this.value)"/>
    <div style="position:relative;">
      <button class="topbar-btn" onclick="nav('notifications')">🔔 Alerts <span class="notif-dot-top" id="notif-dot"></span></button>

    <div class="user-pill" onclick="doLogout()">
      <div class="avatar" id="user-avatar" style="background:var(--blue)">D</div>
      <div class="user-info">
        <div class="uname" id="user-name">Dealer</div>
        <div class="urole" id="user-role-label">Logout ↗</div>
      </div>
    </div>
  </div>

  <div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">AutoTrack Pro v2.0<br>© 2024 All rights reserved</div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main" id="main-content"></div>
  </div>
</div>

<!-- ═══════════════════ MODAL ═══════════════════ -->
<div class="modal-backdrop d-none" id="modal-backdrop" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Modal</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

function doLogin(){

}

function renderSidebar(){
  const cfg = ROLE_CONFIGS[currentRole];
  const notifs = DB.get('notifications')||[];
  const unread = notifs.filter(n=>!n.read).length;
  const html = cfg.nav.map(item=>{
    if(item.sec) return `<div class="nav-section">${item.sec}</div>`;
    const active = item.id===currentPanel?'active':'';
    const badge = item.badge && unread>0 ? `<span class="nav-badge">${unread}</span>`:'';
    return `<div class="nav-item ${active}" onclick="nav('${item.id}')"><span class="nav-icon">${item.icon}</span>${item.label}${badge}</div>`;
  }).join('');
  document.getElementById('sidebar-nav').innerHTML = html;
}

function nav(id){
  currentPanel = id;
  document.getElementById('topbar-page').textContent = PANEL_TITLES[id]||id;
  renderSidebar();
  renderPanel(id);
  document.getElementById('main-content').scrollTop=0;
}

function renderPanel(id){
  const fn = PANELS[id];
  document.getElementById('main-content').innerHTML = fn ? fn() : `<div class="card"><p>Panel not found: ${id}</p></div>`;
}

function updateNotifDot(){
  const notifs = DB.get('notifications')||[];
  const unread = notifs.filter(n=>!n.read).length;
  document.getElementById('notif-dot').style.display = unread>0?'block':'none';
}

//  HELPERS
// ════════════════════════════════════════════════════════════════
function ucfirst(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function fmtMoney(n){ return '₹'+Number(n).toLocaleString('en-IN'); }
function fmtDate(s){ if(!s) return '—'; const d=new Date(s); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function gstAmount(price,rate){ return Math.round(price * rate/100); }
function totalWithGST(price,rate){ return price + gstAmount(price,rate); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function sdName(id){ const sds=DB.get('subdealers')||[]; const sd=sds.find(s=>s.id===id); return sd?sd.name:'—'; }
function badgeClass(s){
  const m={Active:'badge-green',Delivered:'badge-green',Complete:'badge-green',Available:'badge-green',Paid:'badge-green',
    'In Transit':'badge-amber','With Sub-Dealer':'badge-blue',Pending:'badge-amber','Pending POD':'badge-amber',Reserved:'badge-amber',Onboarding:'badge-amber',
    Overdue:'badge-red','Overdue Pay':'badge-red',Invoiced:'badge-blue',Sold:'badge-red',Incomplete:'badge-red'};
  return m[s]||'badge-gray';
}

function globalSearch(q){
  if(!q||q.length<2) return;
  const vehicles=DB.get('vehicles')||[];
  const sds=DB.get('subdealers')||[];
  const lq=q.toLowerCase();
  const vres=vehicles.filter(v=>v.vin.toLowerCase().includes(lq)||v.model.toLowerCase().includes(lq)||v.invNo.toLowerCase().includes(lq));
  const sdres=sds.filter(s=>s.name.toLowerCase().includes(lq)||s.gst.toLowerCase().includes(lq)||s.pan.toLowerCase().includes(lq));
  if(vres.length||sdres.length){
    document.getElementById('main-content').innerHTML = renderSearchResults(vres,sdres,q);
  }
}

function renderSearchResults(v,s,q){
  return `<div class="page-header"><div><div class="page-title">Search Results</div><div class="page-sub">Query: "${q}"</div></div><button class="btn btn-secondary btn-sm" onclick="nav('${currentPanel}')">✕ Clear</button></div>
  ${v.length?`<div class="card"><div class="card-head"><div class="card-title">🏍 Vehicles (${v.length})</div></div>
  <div class="tbl-wrap"><table><thead><tr><th>Invoice</th><th>Date</th><th>Model</th><th>VIN</th><th>Sub-Dealer</th><th>Status</th></tr></thead><tbody>
  ${v.map(r=>`<tr><td>${r.invNo}</td><td>${fmtDate(r.date)}</td><td>${r.model}</td><td class="mono">${r.vin}</td><td>${sdName(r.sdId)}</td><td><span class="badge ${badgeClass(r.status)}">${r.status}</span></td></tr>`).join('')}
  </tbody></table></div></div>`:''}
  ${s.length?`<div class="card"><div class="card-head"><div class="card-title">🤝 Sub-Dealers (${s.length})</div></div>
  <div class="tbl-wrap"><table><thead><tr><th>Name</th><th>GST</th><th>PAN</th><th>City</th><th>Status</th></tr></thead><tbody>
  ${s.map(r=>`<tr><td>${r.name}</td><td class="mono">${r.gst}</td><td class="mono">${r.pan}</td><td>${r.city}</td><td><span class="badge ${badgeClass(r.status)}">${r.status}</span></td></tr>`).join('')}
  </tbody></table></div></div>`:''}
  ${!v.length&&!s.length?`<div class="card"><p style="color:var(--text2);text-align:center;padding:30px">No results found for "${q}"</p></div>`:''}`;
}

// ── NOTIFICATIONS ──────────────────────────────────────────────
PANELS.notifications = function(){
  const notifs = DB.get('notifications')||[];
  const typeInfo = {danger:{bg:'var(--red)',label:'Urgent'},warning:{bg:'var(--amber)',label:'Warning'},info:{bg:'var(--blue)',label:'Info'},success:{bg:'var(--green)',label:'Success'}};
  return `
  <div class="page-header">
    <div><div class="page-title">Notifications & Alerts</div><div class="page-sub">${notifs.filter(n=>!n.read).length} unread</div></div>
    <button class="btn btn-secondary" onclick="markAllRead()">✓ Mark All Read</button>
  </div>
  <div class="card mb0">
    ${notifs.map(n=>`
    <div class="notif-item" id="notif-${n.id}" style="opacity:${n.read?0.6:1}">
      <div class="notif-bullet" style="background:${typeInfo[n.type]?.bg||'var(--blue)'}"></div>
      <div class="notif-content">
        <div class="notif-title">${n.title} ${n.read?'':'<span class="badge badge-blue" style="font-size:10px;padding:1px 6px">New</span>'}</div>
        <div class="notif-body">${n.body}</div>
        <div class="notif-meta">
          <span>${n.time}</span>
          ${n.action?`<a href="#" onclick="nav('${n.action}');markRead('${n.id}')" style="color:var(--blue);font-weight:500">View →</a>`:''}
          ${!n.read?`<a href="#" onclick="markRead('${n.id}')" style="color:var(--text3)">Dismiss</a>`:''}
        </div>
      </div>
    </div>`).join('')}
  </div>`;
};

function markRead(id){
  const n=DB.get('notifications')||[];
  const notif=n.find(x=>x.id===id);
  if(notif) notif.read=true;
  DB.set('notifications',n);
  updateNotifDot();
  renderSidebar();
  renderPanel('notifications');
}
function markAllRead(){
  const n=DB.get('notifications')||[];
  n.forEach(x=>x.read=true);
  DB.set('notifications',n);
  updateNotifDot();
  renderSidebar();
  renderPanel('notifications');
}

      ${['Pending','Pending POD','Complete','Overdue Pay'].map(s=>`<option ${v&&v.docStatus===s?'selected':''}>${s}</option>`).join('')}
    </select></div>
    <div class="fg fg-full"><label>Notes</label><textarea id="m-notes">${v?v.notes:''}</textarea></div>

    ${isEdit?`<button class="btn btn-danger btn-sm" onclick="deleteSale('${v.id}')">Delete</button><div style="flex:1"></div>`:''}

    <button class="btn btn-primary" onclick="${isEdit?`updateSale('${v.id}')`:'saveSale()'}">${isEdit?'Update Sale':'Record Sale & Generate Invoice'}</button>`;

function editSaleModal(id){ openSaleModal(id); }

function saveSale(){
  const vehicles = DB.get('vehicles')||[];
  const newV = {
    id: uid(), invNo: document.getElementById('m-invno').value,
    date: document.getElementById('m-date').value,
    model: document.getElementById('m-model').value,
    vin: document.getElementById('m-vin').value,
    engine: document.getElementById('m-engine').value,
    color: document.getElementById('m-color').value,
    sdId: document.getElementById('m-sdid').value,
    price: parseFloat(document.getElementById('m-price').value)||0,
    gstRate: parseInt(document.getElementById('m-gst').value)||28,
    status: document.getElementById('m-status').value,
    payment: document.getElementById('m-pay').value,
    docStatus: document.getElementById('m-docstatus').value,
    notes: document.getElementById('m-notes').value,
  };
  if(!newV.vin||!newV.engine||!newV.price){ alert('Please fill all required fields.'); return; }
  vehicles.unshift(newV);
  DB.set('vehicles', vehicles);
  // add notification
  addNotif('info','New Sale Recorded',`${newV.model} (${newV.vin}) sold to ${sdName(newV.sdId)} — ${newV.invNo}`,'vehicles');
  closeModal();
  renderPanel('vehicles');
}

function updateSale(id){
  const vehicles = DB.get('vehicles')||[];
  const v = vehicles.find(x=>x.id===id);
  if(!v) return;
  v.model=document.getElementById('m-model').value;
  v.vin=document.getElementById('m-vin').value;
  v.engine=document.getElementById('m-engine').value;
  v.color=document.getElementById('m-color').value;
  v.sdId=document.getElementById('m-sdid').value;
  v.price=parseFloat(document.getElementById('m-price').value)||v.price;
  v.gstRate=parseInt(document.getElementById('m-gst').value)||v.gstRate;
  v.date=document.getElementById('m-date').value;
  v.status=document.getElementById('m-status').value;
  v.payment=document.getElementById('m-pay').value;
  v.docStatus=document.getElementById('m-docstatus').value;
  v.notes=document.getElementById('m-notes').value;
  DB.set('vehicles',vehicles);
  closeModal();
  renderPanel('vehicles');
}

function deleteSale(id){
  if(!confirm('Delete this sale record?')) return;
  const vehicles=(DB.get('vehicles')||[]).filter(v=>v.id!==id);
  DB.set('vehicles',vehicles);
  closeModal();
  renderPanel('vehicles');
}

function addNotif(type,title,body,action){
  const n=DB.get('notifications')||[];
  n.unshift({id:uid(),type,title,body,time:'Just now',read:false,action});
  DB.set('notifications',n);
  updateNotifDot();
  renderSidebar();
}

  const body=`

function doTransfer(){
  const sdId=document.getElementById('tr-sdid').value;
  const checked=[...document.querySelectorAll('input[name="tr-veh"]:checked')].map(c=>c.value);
  if(!checked.length){ alert('Select at least one vehicle.'); return; }
  const stock=DB.get('stock')||[];
  const sds=DB.get('subdealers')||[];
  const sd=sds.find(s=>s.id===sdId);
  checked.forEach(id=>{
    const s=stock.find(x=>x.id===id);
    if(s){ s.sdId=sdId; s.status='With Sub-Dealer'; s.location=sd?sd.name:'Sub-Dealer'; }
  });
  DB.set('stock',stock);
  addNotif('info','Stock Transferred',`${checked.length} vehicle(s) transferred to ${sd?sd.name:'Sub-Dealer'}`,'stock');
  closeModal();
  renderPanel('stock');
}

PANELS.gst = function(){
  const vehicles=DB.get('vehicles')||[];
  const revenue=vehicles.reduce((a,v)=>a+v.price,0);
  const gstTotal=vehicles.reduce((a,v)=>a+gstAmount(v.price,v.gstRate),0);
  const itc=Math.round(gstTotal*0.21);
  return `
  <div class="page-header">
    <div><div class="page-title">GST & Invoice Ledger</div><div class="page-sub">GSTR-1 / GSTR-3B · April 2024</div></div>
    <div class="flex gap8">
      <button class="btn btn-secondary" onclick="exportGSTR()">📤 Export GSTR-1</button>
      <button class="btn btn-primary" onclick="alert('Filing GST return...')">📨 File Return</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card green"><div class="s-label">Total Taxable Value</div><div class="s-val">${fmtMoney(revenue)}</div></div>
    <div class="stat-card amber"><div class="s-label">Output Tax (GST)</div><div class="s-val">${fmtMoney(gstTotal)}</div></div>
    <div class="stat-card blue"><div class="s-label">Input Tax Credit</div><div class="s-val">${fmtMoney(itc)}</div></div>
    <div class="stat-card red"><div class="s-label">Net GST Payable</div><div class="s-val">${fmtMoney(gstTotal-itc)}</div></div>
  </div>
  <div class="card">
    <div class="card-head"><div class="card-title">GSTR-1 Invoice Register</div></div>
    <div class="tbl-wrap"><table><thead>
      <tr><th>Invoice #</th><th>Date</th><th>Sub-Dealer</th><th>GSTIN</th><th>Taxable (₹)</th><th>CGST</th><th>SGST</th><th>IGST</th><th>Invoice Total</th><th>Status</th></tr>
    </thead><tbody>
    ${vehicles.map(v=>{
      const sds=DB.get('subdealers')||[];
      const sd=sds.find(s=>s.id===v.sdId);
      const gst=gstAmount(v.price,v.gstRate);
      const cgst=Math.round(gst/2), sgst=Math.round(gst/2);
      return `<tr>
        <td>${v.invNo}</td>
        <td>${fmtDate(v.date)}</td>
        <td>${sdName(v.sdId)}</td>
        <td class="mono" style="font-size:11px">${sd?sd.gst:'—'}</td>
        <td>${fmtMoney(v.price)}</td>
        <td>${fmtMoney(cgst)}</td>
        <td>${fmtMoney(sgst)}</td>
        <td>₹0</td>
        <td class="fw-bold">${fmtMoney(totalWithGST(v.price,v.gstRate))}</td>
        <td><span class="badge ${v.status==='Delivered'?'badge-green':v.status==='Invoiced'?'badge-blue':'badge-amber'}">${v.status}</span></td>
      </tr>`;
    }).join('')}
    <tr style="background:var(--bg);font-weight:700">
      <td colspan="4">TOTALS</td>
      <td>${fmtMoney(revenue)}</td>
      <td>${fmtMoney(Math.round(gstTotal/2))}</td>
      <td>${fmtMoney(Math.round(gstTotal/2))}</td>
      <td>₹0</td>
      <td style="color:var(--blue)">${fmtMoney(revenue+gstTotal)}</td>
      <td></td>
    </tr>
    </tbody></table></div>
  </div>`;
};

function exportGSTR(){
  const vehicles=DB.get('vehicles')||[];
  const sds=DB.get('subdealers')||[];
  let csv='Invoice No,Date,Sub-Dealer,GSTIN,Taxable Value,CGST,SGST,IGST,Total\n';
  vehicles.forEach(v=>{
    const sd=sds.find(s=>s.id===v.sdId);
    const gst=gstAmount(v.price,v.gstRate);
    csv+=`${v.invNo},${v.date},${sdName(v.sdId)},${sd?sd.gst:''},${v.price},${Math.round(gst/2)},${Math.round(gst/2)},0,${totalWithGST(v.price,v.gstRate)}\n`;
  });
  dlFile(csv,'GSTR1_Apr2024.csv','text/csv');
}

function renderLedgerForSD(sdId,vehicles,sds){
  const sd=sds.find(s=>s.id===sdId);
  if(!sd) return '<p>Select a sub-dealer.</p>';
  const vSales=vehicles.filter(v=>v.sdId===sdId);
  let balance=sd.outstanding>0?-sd.outstanding:45000;
  const rows=[
    {date:'01 Apr',particulars:'Opening Balance',debit:0,credit:0,balance,note:'B/F'},
    ...vSales.map(v=>{
      balance-=totalWithGST(v.price,v.gstRate);
      return {date:v.date,particulars:`Vehicle Transfer — ${v.model} (${v.vin})`,debit:totalWithGST(v.price,v.gstRate),credit:0,balance,note:v.invNo};
    }),
    {date:'05 Apr',particulars:'Payment Received',debit:0,credit:Math.round(sd.outstanding*0.7),balance:(balance+Math.round(sd.outstanding*0.7)),note:'NEFT'},
  ];
  return `<table><thead><tr><th>Date</th><th>Particulars</th><th>Reference</th><th>Debit (₹)</th><th>Credit (₹)</th><th>Balance (₹)</th></tr></thead><tbody>
  ${rows.map(r=>`<tr>
    <td>${typeof r.date==='string'&&r.date.length===10?fmtDate(r.date):r.date}</td>
    <td>${r.particulars}</td><td class="text-muted" style="font-size:11px">${r.note}</td>
    <td style="color:${r.debit?'var(--red)':'var(--text3)'}">${r.debit?fmtMoney(r.debit):'—'}</td>
    <td style="color:${r.credit?'var(--green)':'var(--text3)'}">${r.credit?fmtMoney(r.credit):'—'}</td>
    <td class="fw-bold" style="color:${r.balance<0?'var(--red)':'var(--green)'}">${fmtMoney(Math.abs(r.balance))} ${r.balance<0?'Dr':'Cr'}</td>
  </tr>`).join('')}
  </tbody></table>`;
}

      <div class="rpt-card" onclick="generateReport('ledger')"><div class="rpt-icon">📒</div><div class="rpt-title">Ledger Report</div><div class="rpt-desc">Sub-dealer account statements</div></div>
      <div class="rpt-card" onclick="generateReport('pod')"><div class="rpt-icon">🚚</div><div class="rpt-title">Delivery Report</div><div class="rpt-desc">POD & delivery status</div></div>
      <div class="rpt-card" onclick="generateReport('subdealer')"><div class="rpt-icon">👥</div><div class="rpt-title">Sub-Dealer Report</div><div class="rpt-desc">Performance & compliance</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-head"><div class="card-title">Custom Report Builder</div></div>
    <div class="form-grid">
      <div class="fg"><label>Report Type</label><select id="rpt-type"><option value="sales">Sales</option><option value="stock">Stock</option><option value="gst">GST</option><option value="ledger">Ledger</option></select></div>
      <div class="fg"><label>Sub-Dealer</label><select id="rpt-sd"><option value="">All Sub-Dealers</option>
        ${(DB.get('subdealers')||[]).map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
      </select></div>
      <div class="fg"><label>From Date</label><input type="date" id="rpt-from" value="2024-04-01"></div>
      <div class="fg"><label>To Date</label><input type="date" id="rpt-to" value="2024-04-30"></div>
      <div class="fg"><label>Format</label><select id="rpt-fmt"><option>CSV</option><option>Print / PDF</option></select></div>
    </div>
    <div class="flex gap8">
      <button class="btn btn-primary" onclick="buildCustomReport()">Generate & Download</button>
      <button class="btn btn-secondary" onclick="printReport()">🖨 Print View</button>
    </div>
  </div>`;
};

function generateReport(type){
  const vehicles=DB.get('vehicles')||[];
  const stock=DB.get('stock')||[];
  const sds=DB.get('subdealers')||[];
  let csv='',filename='';
  if(type==='sales'){
    csv='Invoice,Date,Model,VIN,Engine,Color,Sub-Dealer,Price,GST Rate,GST Amount,Total,Status,Payment\n';
    vehicles.forEach(v=>{ csv+=`${v.invNo},${v.date},${v.model},${v.vin},${v.engine},${v.color},${sdName(v.sdId)},${v.price},${v.gstRate}%,${gstAmount(v.price,v.gstRate)},${totalWithGST(v.price,v.gstRate)},${v.status},${v.payment}\n`; });
    filename='Sales_Report_Apr2024.csv';
  } else if(type==='stock'){
    csv='Model,Color,VIN,Engine,Date In,Location,Sub-Dealer,Status\n';
    stock.forEach(s=>{ csv+=`${s.model},${s.color||''},${s.vin},${s.engine},${s.dateIn},${s.location},${s.sdId?sdName(s.sdId):'Dealer HQ'},${s.status}\n`; });
    filename='Stock_Report_Apr2024.csv';
  } else if(type==='gst'){
    csv='Invoice No,Date,Sub-Dealer,GSTIN,Taxable Value,CGST,SGST,IGST,Total\n';
    vehicles.forEach(v=>{ const sd=sds.find(s=>s.id===v.sdId); const gst=gstAmount(v.price,v.gstRate); csv+=`${v.invNo},${v.date},${sdName(v.sdId)},${sd?sd.gst:''},${v.price},${Math.round(gst/2)},${Math.round(gst/2)},0,${totalWithGST(v.price,v.gstRate)}\n`; });
    filename='GST_Report_Apr2024.csv';
  } else if(type==='subdealer'){
    csv='Name,Owner,GSTIN,PAN,City,Phone,Credit Limit,Outstanding,Status,Docs\n';
    sds.forEach(s=>{ csv+=`${s.name},${s.owner},${s.gst},${s.pan},${s.city},${s.phone},${s.creditLimit},${s.outstanding},${s.status},${s.docs}\n`; });
    filename='SubDealer_Report_Apr2024.csv';
  } else {
    alert('Report type "'+type+'" — downloading CSV...');
    csv='Report,Date\n'+type+','+new Date().toISOString().slice(0,10);
    filename=type+'_report.csv';
  }
  dlFile(csv,filename,'text/csv');
}

function buildCustomReport(){
  const type=document.getElementById('rpt-type').value;
  const fmt=document.getElementById('rpt-fmt').value;
  if(fmt==='Print / PDF'){ printReport(); return; }
  generateReport(type);
}

function printReport(){
  const vehicles=DB.get('vehicles')||[];
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>AutoTrack Pro — Report</title>
  <style>body{font-family:sans-serif;font-size:13px;padding:20px}table{width:100%;border-collapse:collapse}th,td{padding:7px;border:1px solid #ddd;text-align:left}th{background:#f0f0f0}h2{margin-bottom:10px}</style>
  </head><body><h2>Sales Report — April 2024</h2><p>Generated: ${new Date().toLocaleDateString()}</p>
  <table><thead><tr><th>Invoice</th><th>Date</th><th>Model</th><th>VIN</th><th>Sub-Dealer</th><th>Price</th><th>GST</th><th>Total</th><th>Status</th></tr></thead><tbody>
  ${vehicles.map(v=>`<tr><td>${v.invNo}</td><td>${v.date}</td><td>${v.model}</td><td>${v.vin}</td><td>${sdName(v.sdId)}</td><td>₹${v.price}</td><td>₹${gstAmount(v.price,v.gstRate)}</td><td>₹${totalWithGST(v.price,v.gstRate)}</td><td>${v.status}</td></tr>`).join('')}
  </tbody></table></body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),500);
}

function dlFile(content, filename, mime){
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

        <div class="fg"><label>ID Type</label><select id="sds-idtype"><option>Aadhaar</option><option>Driving License</option><option>PAN</option><option>Voter ID</option></select></div>

      <button class="btn btn-primary" style="margin-top:8px" onclick="recordSDSale()">Record Sale & Update Stock</button>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">Document Checklist</div></div>
      <div class="alert alert-blue mb0"><span class="alert-icon">ℹ️</span>Upload these documents after completing the sale to keep your records compliant.</div>
      ${['Customer ID Proof','Signed Invoice Copy','Proof of Delivery (POD)','Finance Agreement (if applicable)'].map(d=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:13px;font-weight:500">${d}</div>
          <div class="text-muted" style="font-size:11px">Required within 48 hours of delivery</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="nav('documents')">Upload</button>
      </div>`).join('')}
    </div>
  </div>`;
};

function recordSDSale(){
  const vin=document.getElementById('sds-vin').value;
  const cname=document.getElementById('sds-cname').value;
  const price=document.getElementById('sds-price').value;
  if(!cname||!price){ alert('Please fill in customer name and sale price.'); return; }
  // update stock
  const stock=DB.get('stock')||[];
  const si=stock.find(s=>s.id===vin);
  if(si){ si.status='Sold'; si.sdId=''; }
  DB.set('stock',stock);
  // add vehicle sale record
  const vehicles=DB.get('vehicles')||[];
  const invNo='INV-2024-'+(vehicles.length+48);
  vehicles.unshift({
    id:uid(), invNo, date:document.getElementById('sds-date').value,
    model:si?si.model:'Vehicle', vin:si?si.vin:'', engine:si?si.engine:'',
    color:si?si.color:'', sdId:'sd1',
    price:parseFloat(price), gstRate:28,
    status:'Delivered', payment:document.getElementById('sds-pay').value,
    docStatus:'Pending POD', notes:'Retail sale by sub-dealer',
  });
  DB.set('vehicles',vehicles);
  addNotif('info','Sub-Dealer Sale Recorded',`Krishna Motors sold ${si?si.model:'vehicle'} (${si?si.vin:''}) to ${cname}`,'vehicles');
  alert(`Sale recorded! Invoice ${invNo} generated. Please upload documents to complete the transaction.`);
  nav('sd_dashboard');
}
